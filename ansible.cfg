[defaults]
# No global inventory: pass -i inventories/<env>/hosts.yml explicitly so prod/staging never mix.
roles_path = roles
collections_path = collections
inventory_plugins = inventory_plugins
filter_plugins = filter_plugins
library = library
stdout_callback = ansible.builtin.default
result_format = yaml
bin_ansible_callbacks = true
# OTel: emits one trace per run (a span per task) to OTEL_EXPORTER_OTLP_ENDPOINT.
# Needs the community.general collection + opentelemetry-* python libs (see pyproject.toml).
callbacks_enabled = community.general.opentelemetry
interpreter_python = auto_silent
retry_files_enabled = false
nocows = true
# Convenient for ephemeral LXD test hosts; review before pointing at production.
host_key_checking = false

[callback_opentelemetry]
# Hide task arguments from traces to avoid leaking secrets.
hide_task_arguments = true
# Service name for direct playbook runs; Molecule overrides this via OTEL_SERVICE_NAME=ansible-molecule.
otel_service_name = ansible
# Uncomment to enable the callback only when a specific env var is set (e.g. on a CI controller).
# enable_from_environment = CI

[ssh_connection]
pipelining = true
