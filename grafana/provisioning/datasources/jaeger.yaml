apiVersion: 1

# Pre-wire Grafana to the Jaeger all-in-one query API. Within the compose network,
# services resolve each other by service name, so "jaeger" is the container running
# the Jaeger UI/query service on port 16686.
datasources:
  - name: Jaeger
    type: jaeger
    access: proxy
    uid: jaeger
    url: http://jaeger:16686
    isDefault: true
    editable: true
