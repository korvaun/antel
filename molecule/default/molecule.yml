---
# Molecule scenario: throwaway docker containers as playbook targets.
# Inside the devcontainer the engine is the docker-in-docker daemon; on a bare host
# it's your local docker. The OpenTelemetry callback runs on the control node (where
# molecule runs ansible) and exports to the Jaeger container — see observability/compose.yaml.
driver:
  name: docker

platforms:
  # geerlingguy images are systemd-enabled and ansible-ready (the de-facto molecule targets).
  # The privileged + cgroup settings let systemd boot inside the container; drop them if a
  # plain (non-systemd) target is enough for what you're testing.
  - name: antel-web
    image: docker.io/geerlingguy/docker-ubuntu2404-ansible:latest
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    command: /usr/lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
  - name: antel-db
    image: docker.io/geerlingguy/docker-ubuntu2404-ansible:latest
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    command: /usr/lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

provisioner:
  name: ansible
  env:
    ANSIBLE_CALLBACKS_ENABLED: community.general.opentelemetry
    OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4317
    OTEL_SERVICE_NAME: ansible-molecule
  playbooks:
    converge: converge.yml

verifier:
  name: ansible
