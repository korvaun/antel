# Local observability stack for exploring the Ansible OpenTelemetry callback output.
#   podman compose -f observability/compose.yaml up -d
#   open http://localhost:3000    (Grafana — Tempo datasource pre-provisioned)
#   open http://localhost:3200    (Tempo HTTP API, optional direct access)
#   ...run a playbook (callback exports to host.containers.internal:4317)...
#   podman compose -f observability/compose.yaml down
#
# Flow: Ansible callback → OTel Collector:4317 → Tempo → Grafana
# The Collector is the single OTLP ingestion point; adding new exporters
# (Mimir, OpenSearch, ...) later is a config-only change in otelcol/config.yaml.
services:
  otelcol:
    # Pin to a specific tag for reproducibility, e.g. otel/opentelemetry-collector-contrib:0.123.0
    image: docker.io/otel/opentelemetry-collector-contrib:latest
    container_name: antel-otelcol
    volumes:
      - ./otelcol/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"     # OTLP gRPC  (ansible OTel callback target)
      - "4318:4318"     # OTLP HTTP
    depends_on:
      - tempo

  prometheus:
    image: docker.io/prom/prometheus:latest
    container_name: antel-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      # Accept remote_write from Tempo's metrics_generator
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  tempo:
    # Pin to a specific tag for reproducibility, e.g. grafana/tempo:2.7.2
    image: docker.io/grafana/tempo:latest
    container_name: antel-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"     # HTTP query API (Grafana datasource + direct access)
    depends_on:
      - prometheus

  grafana:
    # Pin to a specific tag for reproducibility, e.g. grafana/grafana:11.6.0
    image: docker.io/grafana/grafana:latest
    container_name: antel-grafana
    environment:
      # Local sandbox: skip the login wall, land straight on an admin session.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    ports:
      - "3000:3000"     # web UI
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - tempo

volumes:
  tempo-data:
  prometheus-data:
