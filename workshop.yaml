# Canonical Workshop — sandboxed dev environment.
# Schema: https://ubuntu.com/workshop/docs/reference/definition-files/workshop-definition
# Tip: append `.md` to any Workshop doc URL to read it as Markdown.
name: antel
base: ubuntu@26.04

# SDKs are snap-based dev kits installed into the workshop.
# NOTE: verify the exact SDK `name`/`channel` against the catalog/docs above —
# the schema is confirmed, the specific Python SDK identifier is not.
sdks:
  - name: python

# Named scripts, run with `workshop run <action>`. errexit + pipefail are enabled;
# arguments are available as bash positional params ($1, $@).
actions:
  setup: |
    command -v uv >/dev/null 2>&1 || pip install --user uv
    uv sync
    uv run ansible-galaxy collection install -r collections/requirements.yml
  lint: |
    uv run yamllint .
    uv run ansible-lint
    uv run ruff check .
    uv run mypy .
  check: |
    uv run ansible-playbook -i "inventories/${1:-staging}/hosts.yml" \
      playbooks/site.yml --check --diff
  test: |
    uv run molecule test
    uv run pytest

